<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneakers</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header class="navigation-bar">
        <div class="logo">
            <img src="./images/logo.svg" alt="">
        </div>
        <div class="nav-links">
            <div>
                <a href="">Collections</a> 
            </div>
            <div>
                <a href="">Men</a>
            </div>
            <div>
                <a href="">Women</a>
            </div>
            <div>
                <a href="">About</a>
            </div>
            <div>
                <a href="">About Us</a>
            </div>
        </div>
        <div class="profile-section">
            <a href=""><img src="./images/icon-cart.svg" alt="" class="cart-img"></a> <a href=""><img src="./images/image-avatar.png" alt="" class="profile-img"></a>
        </div>
    </header>
    <main class="main-content">
        <div class="image-section">
            <div class="large-image-container">
                <img src="./images/image-product-1.jpg" alt="" class="large-image">
            </div>
            <div class="thumbnail-div-container"></div>
        </div>
        <div class="description-section">
            <p class="company-name">
                SNEAKER COMPANY
            </p>
            <p class="product-name">
                Fall Limited Edition Sneakers
            </p>
            <p class="product-description">
                These low-profile sneakers are your perfect casual wear companion. Featuring a durable rubber outer sole, they'll withstand everything the weather can offer.
            </p>
            <p class="product-price">
                $125.00 <span class="percent-off">50%</span>
            </p>
            <p class="former-product-price">
                <strike>$250.00</strike>
            </p>
            <div class="quantityAdd-to-cart">
                <div class="quantity-selector">
                    <button class="quantity-button js-minus-button" >-</button><span class="quantity-view">0</span><button class="quantity-button js-add-button">+</button>
                </div>
                <div class="add-to-cart">
                    <button class="add-to-cart-btn js-add-to-cart-btn"><img src="./images/icon-cart.svg" alt=""> Add to cart</button>
                </div>
            </div>
        </div>
    </main>
    <script src="./index.js" type="module"></script>
</body>
</html>
